blueprint:
  name: View Assist - Play Music with Music Assistant
  description:
    Use various methods to play individual songs, artists, albums, and playlists
    or to add songs to your queue using your Music Assistant server. Be careful
    to choose commands that are not ambiguous (e.g. "Play {artist}" and "Play
    {album}" will cause issues)
    (View Assist Play Music with Music Assistant v 1.3.0)
  domain: automation
  input:
    ma_instance:
      name: Music Assistant Instance
      description: Select the Music Assistant instance
      selector:
        config_entry:
          integration: music_assistant
    view_path:
      name: Dashboard Info view
      description:
        The View Assist dashboard view to use for displaying music information
        (example /view-assist/music)
      default: /view-assist/music
    language:
      name: Language
      description: The desired spoken language
      default: en
      selector:
        language:
          languages:
            - ca
            - de
            - en
            - es
            - nl
            - pl
            - pt
            - ro
          no_sort: false
          native_name: false
    play_artist_command:
      name: Play Artist Command
      description: The command to trigger the play artist action
      default:
        (play the artist {artist} | play some {artist} [music] |play [some]
        [music | songs] by {artist})
    play_playlist_command:
      name: Play Playlist Command
      description: The command to trigger the play playlist action
      default: start [the] {playlist} playlist
    play_song_command:
      name: Play Song Command
      description: The command to trigger the play song action
      default: play {song} by {artist}
    queue_song_command:
      name: Queue Song Command
      description: The command to trigger the queue song action
      default: (queue | cue | Q) {song} by {artist}
    play_album_command:
      name: Play Album Command
      description: The command to trigger the play album action
      default: album play {album} [by {artist}]
alias: View Assist - Play Music with Music Assistant
description: Play music using music assistant
trigger:
  - trigger: conversation
    command: !input play_artist_command
    id: playartist
  - trigger: conversation
    command: !input play_playlist_command
    id: playlist
  - trigger: conversation
    command: !input play_song_command
    id: playsong
  - trigger: conversation
    command: !input queue_song_command
    id: cuesong
  - trigger: conversation
    command: !input play_album_command
    id: playalbum
conditions: []
actions:
  - variables:
      target_satellite_device: "{{ view_assist_entity(trigger.device_id) }}"
      target_mediaplayer_device: "{{ state_attr(target_satellite_device, 'mediaplayer_device')}}"
      target_satellite_device_type: "{{ state_attr(target_satellite_device, 'type')}}"
      target_musicplayer_device:
        "{{ state_attr(target_satellite_device, 'musicplayer_device')
        }}"
      target_use_announce:
        "{{ state_attr(target_satellite_device, 'use_announce')
        }}"
      view_path: !input view_path
      ma_instance: !input ma_instance
      language: !input language
      translations:
        ca:
          responses:
            playartist_found: "Reproduint música de {artist}"
            playartist_not_found: "No he pogut trobar música per a {search_artist}"
            playlist_found: "Reproduint la llista de reproducció {playlist}"
            playlist_not_found: "Ho sento, no s'ha pogut trobar cap llista anomenada {search_playlist}"
            playsong_found: "Reproduint {song} de {artist}"
            playsong_not_found: "Ho sento, no s'ha trobat {song} de {artist}"
            playsong_queue: "Afegint a la cua {song} de {artist}"
        en:
          responses:
            playartist_found: Playing {artist} music
            playartist_not_found: I was unable to find any music for {search_artist}
            playlist_found: Playing the {playlist} playlist
            playlist_not_found:
              Sorry, no playlist named {search_playlist} could be
              found
            playsong_found: Playing {song} by {artist}
            playsong_not_found: Sorry {song} by {artist} was not found
            playsong_queue: Queuing {song} by {artist}
            playalbum_with_artist_found: Playing album {album} by {artist}
            playalbum_with_artist_not_found: Sorry album {album} by {artist} was not found
            playalbum_no_artist_found: Playing album {album}
            playalbum_no_artist_not_found: Sorry album {album} was not found
        de:
          responses:
            playartist_found: Spiele Musik von {artist}
            playartist_not_found:
              Entschuldigung, ich konnte keine Musik von {search_artist}
              finden
            playlist_found: Spiele die Playlist {playlist}
            playlist_not_found:
              Entschuldigung, ich konnte keine Playlist mit dem Namen
              {search_playlist} finden
            playsong_found: Spiele {song} von {artist}
            playsong_not_found:
              Entschuldigung, ich konnte den Song {song} von {artist}
              nicht finden
            playsong_queue: Füge {song} von {artist} zur Warteschlange hinzu
        es:
          responses:
            playartist_found: "Reproduciendo música de {artist}"
            playartist_not_found: "No he podido encontrar música para {search_artist}"
            playlist_found: "Reproduciendo la lista de reproducción {playlist}"
            playlist_not_found: "Lo siento, no se ha podido encontrar ninguna lista llamada {search_playlist}"
            playsong_found: "Reproduciendo {song} de {artist}"
            playsong_not_found: "Lo siento, no se ha encontrado {song} de {artist}"
            playsong_queue: "Añadiendo a la cola {song} de {artist}"
        nl:
          responses:
            playartist_found: Muziek van {artist} afspelen
            playartist_not_found: Ik kon geen muziek vinden van {search_artist}
            playlist_found: De afspeellijst {playlist} afspelen
            playlist_not_found:
              Sorry, er kon geen afspeellijst met de naam {search_playlist}
              worden gevonden
            playsong_found: "{song} van {artist} afspelen"
            playsong_not_found: Sorry, {song} van {artist} is niet gevonden
            playsong_queue: "{song} van {artist} toevoegen aan de wachtrij"
        pl:
          responses:
            playartist_found: Odtwarzam muzykę {artist}
            playartist_not_found: Nie udało się znaleźć muzyki dla {search_artist}
            playlist_found: Odtwarzam playlistę {playlist}
            playlist_not_found: Przepraszam, nie znaleziono playlisty o nazwie {search_playlist}
            playsong_found: Odtwarzam {song} od {artist}
            playsong_not_found: Przepraszam, nie znaleziono {song} od {artist}
            playsong_queue: Dodaję do kolejki {song} od {artist}
        pt:
          responses:
            playartist_found: Tocando música de {artist}
            playartist_not_found: Não foi possível encontrar nenhuma música de {search_artist}
            playlist_found: Tocando a Playlist {playlist}
            playlist_not_found:
              Desculpe, nenhuma Playlist com o nome {search_playlist}
              pode ser encontrada
            playsong_found: Tocando {song} por {artist}
            playsong_not_found: Desculpe, a música {song} por {artist} não foi encontrada
            playsong_queue: Incluindo a música {song} por {artist} na lista
        ro:
          responses:
            playartist_found: Redau muzică de {artist}
            playartist_not_found: Nu am găsit muzică de {search_artist}
            playlist_found: Redau lista de redare {playlist}
            playlist_not_found:
              Îmi pare rău, nu a fost găsită nicio listă de redare
              numită {search_playlist}
            playsong_found: Redau {song} de {artist}
            playsong_not_found: Îmi pare rău, {song} de {artist} nu a fost găsit
            playsong_queue: Adaug în coadă {song} de {artist}
  - choose:
      - conditions:
          - condition: trigger
            id:
              - playartist
        sequence:
          - action: music_assistant.search
            data:
              limit: 1
              config_entry_id: "{{ ma_instance }}"
              media_type:
                - artist
              name: "{{ trigger.slots.artist  }}"
            response_variable: found_artist
          - alias: Did we find an artist?
            if:
              - condition: template
                value_template: "{{found_artist['artists'] | count>0}}"
                alias: We found an artist!
            then:
              - action: view_assist.set_state
                target:
                  entity_id: "{{ target_satellite_device }}"
                data:
                  mode: music
                  title: ""
                  message_font_size: 5vw
              - action: view_assist.navigate
                data:
                  device: "{{ target_satellite_device }}"
                  path: "{{ view_path }}"
              - action: music_assistant.play_media
                target:
                  entity_id: "{{ target_musicplayer_device }}"
                data:
                  media_type: artist
                  enqueue: replace
                  media_id: "{{ found_artist.artists.0.name }}"
              - if:
                  - condition: template
                    value_template: "{{ target_use_announce is not false }}"
                then:
                  - variables:
                      conversation_response:
                        '{{ translations[language][''responses''][''playartist_found''].replace("{artist}",
                        found_artist.artists.0.name)}}'
                  - set_conversation_response: "{{ conversation_response }}"
                  - action: view_assist.set_state
                    target:
                      entity_id: "{{ target_satellite_device }}"
                    data:
                      last_said: "{{ conversation_response }}"
                else:
                  - set_conversation_response: ""
            else:
              - if:
                  - condition: template
                    value_template: "{{ target_use_announce is not false }}"
                then:
                  - variables:
                      conversation_response:
                        '{{ translations[language][''responses''][''playartist_not_found''].replace("{search_artist}",
                        trigger.slots.artist)}}'
                  - set_conversation_response: "{{ conversation_response }}"
                  - action: view_assist.set_state
                    target:
                      entity_id: "{{ target_satellite_device }}"
                    data:
                      last_said: "{{ conversation_response }}"
                else:
                  - set_conversation_response: ""
      - conditions:
          - condition: trigger
            id:
              - playlist
        sequence:
          - action: music_assistant.search
            data:
              limit: 1
              config_entry_id: "{{ ma_instance }}"
              media_type:
                - playlist
              name: "{{ trigger.slots.playlist }}"
            response_variable: found_playlist
          - alias: Did we find a playlist?
            if:
              - condition: template
                value_template: "{{found_playlist['playlists'] | count>0}}"
                alias: We found a playlist!
            then:
              - action: view_assist.set_state
                target:
                  entity_id: "{{ target_satellite_device }}"
                data:
                  mode: music
                  title: ""
                  message_font_size: 5vw
              - action: view_assist.navigate
                data:
                  device: "{{ target_satellite_device }}"
                  path: "{{ view_path }}"
              - action: music_assistant.play_media
                target:
                  entity_id: "{{ target_musicplayer_device }}"
                data:
                  media_type: playlist
                  enqueue: replace
                  media_id: "{{ trigger.slots.playlist }}"
              - if:
                  - condition: template
                    value_template: "{{ target_use_announce is not false }}"
                then:
                  - variables:
                      conversation_response:
                        '{{ translations[language][''responses''][''playlist_found''].replace("{playlist}",
                        found_playlist.playlists.0.name )}}'
                  - set_conversation_response: "{{ conversation_response }}"
                  - action: view_assist.set_state
                    target:
                      entity_id: "{{ target_satellite_device }}"
                    data:
                      last_said: "{{ conversation_response }}"
                else:
                  - set_conversation_response: ""
            else:
              - if:
                  - condition: template
                    value_template: "{{ target_use_announce is not false }}"
                then:
                  - variables:
                      conversation_response:
                        '{{ translations[language][''responses''][''playlist_not_found''].replace("{search_playlist}",
                        trigger.slots.playlist )}}'
                  - set_conversation_response: "{{ conversation_response }}"
                  - action: view_assist.set_state
                    target:
                      entity_id: "{{ target_satellite_device }}"
                    data:
                      last_said: "{{ conversation_response }}"
                else:
                  - set_conversation_response: ""
      - conditions:
          - condition: trigger
            id:
              - playalbum
        sequence:
          - action: music_assistant.search
            data:
              limit: 1
              config_entry_id: "{{ ma_instance }}"
              media_type:
                - album
              name: "{{ trigger.slots.album  }}"

              artist: "{{ trigger.slots.artist | trim }}"
            response_variable: found_album
          - alias: Did we find an album?
            if:
              - condition: template
                value_template: "{{found_album['albums'] | count>0}}"
                alias: We found an album!
            then:
              - action: view_assist.set_state
                target:
                  entity_id: "{{ target_satellite_device }}"
                data:
                  mode: music
                  title: ""
                  message_font_size: 5vw
              - action: view_assist.navigate
                data:
                  device: "{{ target_satellite_device }}"
                  path: "{{ view_path }}"
              - action: music_assistant.play_media
                target:
                  entity_id: "{{ target_musicplayer_device }}"
                data:
                  media_type: album
                  enqueue: replace
                  media_id: "{{ found_album.albums.0.uri }}"
              - if:
                  - condition: template
                    value_template: "{{ target_use_announce is not false }}"
                then:
                  - variables:
                      conversation_response: >-
                        {{
                          (translations[language]['responses']['playalbum_with_artist_found']
                            .replace('{album}', found_album.albums.0.name)
                            .replace('{artist}', found_album.albums.0.artists.0.name))
                          if (trigger.slots.artist | trim != '')
                          else (translations[language]['responses']['playalbum_no_artist_found']
                            .replace('{album}', found_album.albums.0.name))
                        }}
                  - set_conversation_response: "{{ conversation_response }}"
                  - action: view_assist.set_state
                    target:
                      entity_id: "{{ target_satellite_device }}"
                    data:
                      last_said: "{{ conversation_response }}"
                else:
                  - set_conversation_response: ""
            else:
              - if:
                  - condition: template
                    value_template: "{{ target_use_announce is not false }}"
                then:
                  - variables:
                      conversation_response: >-
                        {{
                          (translations[language]['responses']['playalbum_with_artist_not_found']
                            .replace('{album}', trigger.slots.album)
                            .replace('{artist}', trigger.slots.artist))
                          if (trigger.slots.artist | trim != '')
                          else (translations[language]['responses']['playalbum_no_artist_not_found']
                            .replace('{album}', trigger.slots.album))
                        }}
                  - set_conversation_response: "{{ conversation_response }}"
                  - action: view_assist.set_state
                    target:
                      entity_id: "{{ target_satellite_device }}"
                    data:
                      last_said: "{{ conversation_response }}"
                else:
                  - set_conversation_response: ""
      - conditions:
          - condition: trigger
            id:
              - playsong
              - cuesong
        sequence:
          - action: music_assistant.search
            data:
              limit: 1
              config_entry_id: "{{ ma_instance }}"
              media_type:
                - track
              name: "{{ trigger.slots.song  }}"
              artist: "{{ trigger.slots.artist | default('') }}"
            response_variable: found_track
          - alias: Did we find a track?
            if:
              - condition: template
                value_template: "{{found_track['tracks'] | count>0}}"
                alias: We found a track!
            then:
              - action: view_assist.set_state
                target:
                  entity_id: "{{ target_satellite_device }}"
                data:
                  mode: music
                  title: ""
                  message_font_size: 5vw
              - action: view_assist.navigate
                data:
                  device: "{{ target_satellite_device }}"
                  path: "{{ view_path }}"
              - alias:
                  Set enqueue_type, media_type and response_first_word depending on cuesong
                  or playsong trigger
                choose:
                  - conditions:
                      - condition: trigger
                        id:
                          - cuesong
                    sequence:
                      - action: music_assistant.play_media
                        target:
                          entity_id: "{{ target_musicplayer_device }}"
                        data:
                          media_type: track
                          enqueue: next
                          media_id: "{{ found_track.tracks.0.name }}"
                          artist: "{{ trigger.slots.artist  }}"
                      - if:
                          - condition: template
                            value_template: "{{ target_use_announce is not false }}"
                        then:
                          - variables:
                              conversation_response: >-
                                {{ translations[language]['responses']['playsong_found'].replace("{artist}", found_track.tracks[0].artists[0].name).replace("{song}", found_track.tracks[0].name) }}
                          - set_conversation_response: "{{ conversation_response }}"
                          - action: view_assist.set_state
                            target:
                              entity_id: "{{ target_satellite_device }}"
                            data:
                              last_said: "{{ conversation_response }}"
                        else:
                          - set_conversation_response: ""
                  - conditions:
                      - condition: trigger
                        id:
                          - playsong
                    sequence:
                      - action: music_assistant.play_media
                        target:
                          entity_id: "{{ target_musicplayer_device }}"
                        data:
                          media_type: track
                          enqueue: play
                          media_id: "{{ found_track.tracks.0.name }}"
                          artist: "{{ trigger.slots.artist  }}"
                      - if:
                          - condition: template
                            value_template: "{{ target_use_announce is not false }}"
                        then:
                          - variables:
                              conversation_response: >-
                                {{ translations[language]['responses']['playsong_found'].replace("{artist}", found_track.tracks[0].artists[0].name).replace("{song}", found_track.tracks[0].name) }}

                          - set_conversation_response: "{{ conversation_response }}"
                          - action: view_assist.set_state
                            target:
                              entity_id: "{{ target_satellite_device }}"
                            data:
                              last_said: "{{ conversation_response }}"
                        else:
                          - set_conversation_response: ""
            else:
              - if:
                  - condition: template
                    value_template: "{{ target_use_announce is not false }}"
                then:
                  - variables:
                      conversation_response:
                        '{{ translations[language][''responses''][''playsong_not_found''].replace("{artist}",
                        trigger.slots.artist ).replace("{song}", trigger.slots.song ) }}'
                  - set_conversation_response: "{{ conversation_response }}"
                  - action: view_assist.set_state
                    target:
                      entity_id: "{{ target_satellite_device }}"
                    data:
                      last_said: "{{ conversation_response }}"
                else:
                  - set_conversation_response: ""



